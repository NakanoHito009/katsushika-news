<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>葛飾区ニュースまとめ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="header-brand">
        <span class="header-icon">🏙️</span>
        <div>
          <h1 class="header-title">葛飾区ニュースまとめ</h1>
          <p class="header-tagline">葛飾区の最新情報をお届けします</p>
        </div>
      </div>
    </div>
  </header>

  <main class="main-content">

    <section class="controls">
      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input id="search-input" type="text" placeholder="キーワードで検索...">
      </div>

      <div id="category-filters">
        <button class="filter-btn active" data-category="all">全て</button>
        <button class="filter-btn" data-category="kusei">区政</button>
        <button class="filter-btn" data-category="bousai">防災</button>
        <button class="filter-btn" data-category="event">イベント</button>
        <button class="filter-btn" data-category="seikatsu">生活情報</button>
        <button class="filter-btn" data-category="kosodate">子育て</button>
        <button class="filter-btn" data-category="fukushi">福祉</button>
      </div>

      <p class="results-count"><span id="news-count">0</span>件のニュース</p>
    </section>

    <div id="news-grid"></div>

    <div id="no-results">
      <span class="no-results-icon">📭</span>
      <p>該当するニュースはありません</p>
    </div>

  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p>&copy; 2026 葛飾区ニュースまとめ — 非公式まとめサイト</p>
    </div>
  </footer>

  <!-- Modal -->
  <div id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div id="modal">
      <button id="modal-close" aria-label="閉じる">&times;</button>
      <div id="modal-badge"></div>
      <h2 id="modal-title"></h2>
      <time id="modal-date"></time>
      <p id="modal-summary"></p>
      <a id="modal-link" href="#" target="_blank" rel="noopener">葛飾区公式サイトで読む →</a>
    </div>
  </div>

  <script src="js/app.js" defer></script>
</body>
</html>
